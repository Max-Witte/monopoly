<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monopoly – Custom Edition</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a2639;
      --surface:    #243447;
      --surface2:   #2e4060;
      --accent:     #e8b86d;
      --accent2:    #5bb5a2;
      --text:       #f0ead6;
      --text-dim:   #9aacbf;
      --danger:     #e05c5c;
      --success:    #5bb58b;
      --board-bg:   #dff0e0;
      --board-line: #2a5a2a;
      --radius:     8px;
      --shadow:     0 4px 20px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Setup Screen ──────────────────────────────────────── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 32px;
    }

    .setup-title {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 2px 12px rgba(232,184,109,.4);
      letter-spacing: 4px;
      text-align: center;
    }
    .setup-subtitle { color: var(--text-dim); letter-spacing: 2px; text-align: center; margin-top: -20px; }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
    }
    .setup-card h2 { color: var(--accent); margin-bottom: 18px; font-size: 1.1rem; letter-spacing: 1px; }

    .setup-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-btn {
      flex: 1; padding: 10px;
      background: var(--surface2); color: var(--text-dim);
      border: 1px solid transparent; border-radius: var(--radius);
      cursor: pointer; font-family: inherit; font-size: .9rem;
      transition: all .2s;
    }
    .tab-btn.active { background: var(--accent); color: #1a2639; font-weight: bold; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    input[type=text] {
      background: var(--surface2); color: var(--text);
      border: 1px solid #3d5775; border-radius: var(--radius);
      padding: 10px 14px; font-family: inherit; font-size: 1rem;
      outline: none; transition: border-color .2s;
    }
    input[type=text]:focus { border-color: var(--accent); }
    input[type=text]::placeholder { color: var(--text-dim); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: var(--radius);
      font-family: inherit; font-size: .9rem; cursor: pointer;
      border: none; transition: all .15s; font-weight: bold;
    }
    .btn-primary   { background: var(--accent);  color: #1a2639; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #3d5775; }
    .btn-danger    { background: var(--danger);   color: #fff; }
    .btn-success   { background: var(--success);  color: #fff; }
    .btn-sm        { padding: 5px 10px; font-size: .8rem; }
    .btn:hover     { opacity: .85; transform: translateY(-1px); }
    .btn:active    { transform: translateY(0); }
    .btn-row       { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-full      { width: 100%; }

    /* ── Game Screen ───────────────────────────────────────── */
    #game-screen {
      display: none;
      grid-template-columns: 1fr auto 300px;
      grid-template-rows: 1fr;
      height: 100vh;
      gap: 0;
    }

    /* ── Board ─────────────────────────────────────────────── */
    #board-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 12px; overflow: auto; background: var(--bg);
    }

    #board-canvas { width: 100%; max-width: 700px; aspect-ratio: 1; }

    .board-grid {
      display: grid;
      grid-template-rows: auto 1fr auto;
      width: 100%; height: 100%;
      background: var(--board-bg);
      border: 3px solid var(--board-line);
      border-radius: 4px;
      overflow: hidden;
    }

    .board-row { display: grid; }
    .top-row    { grid-template-columns: 1.6fr repeat(9, 1fr) 1.6fr; }
    .bottom-row { grid-template-columns: 1.6fr repeat(9, 1fr) 1.6fr; }

    .board-middle {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1.6fr;
    }

    .board-col { display: grid; }
    .left-col  { grid-template-rows: repeat(9, 1fr); }
    .right-col { grid-template-rows: repeat(9, 1fr); }

    .board-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: var(--board-bg);
      padding: 10px;
    }

    .board-logo {
      text-align: center;
      border: 3px solid var(--board-line);
      padding: 12px 20px;
      border-radius: 4px;
      background: #fff8e7;
    }
    .logo-top {
      font-size: clamp(1.2rem, 2vw, 2rem);
      font-weight: 900;
      color: var(--board-line);
      letter-spacing: 4px;
    }
    .logo-sub { font-size: .7rem; color: #666; letter-spacing: 2px; margin-top: 2px; }

    .center-info { text-align: center; }
    .turn-indicator {
      display: flex; align-items: center; gap: 6px; justify-content: center;
      font-size: .75rem; color: #333;
    }
    .turn-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dice-display { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
    .die {
      width: 28px; height: 28px;
      background: #fff; border: 2px solid #333; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 1rem; color: #333;
    }

    /* ── Space ─────────────────────────────────────────────── */
    .space {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid var(--board-line);
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      transition: background .15s;
      padding: 2px;
      min-height: 0; min-width: 0;
    }
    .space:hover { background: #fffff0; }
    .space.active-space { background: #fffff0; box-shadow: inset 0 0 0 2px #f39c12; }
    .space.mortgaged { opacity: .6; }

    /* Corners are bigger */
    .top-row .space:first-child,
    .top-row .space:last-child,
    .bottom-row .space:first-child,
    .bottom-row .space:last-child {
      font-size: .55rem;
    }

    .color-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 6px; border-radius: 2px 2px 0 0;
    }

    .space-name {
      font-size: clamp(4px, .8vw, 9px);
      text-align: center; color: #222;
      line-height: 1.2;
      padding: 0 1px;
      word-break: break-word;
    }
    .space-icon {
      font-size: clamp(6px, 1.2vw, 14px);
      font-weight: bold; color: #333;
    }
    .space-icon.go    { color: #c00; font-size: clamp(8px, 1.5vw, 18px); }
    .space-icon.chance { color: #e67e22; font-size: clamp(8px, 1.5vw, 20px); font-weight: 900; }
    .price-tag { font-size: clamp(4px, .7vw, 8px); color: #555; }

    .owner-dot {
      position: absolute; bottom: 2px; right: 2px;
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,.2);
    }

    .mortgaged-label {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: clamp(4px, .7vw, 7px); color: #c00; font-weight: bold;
      background: rgba(255,255,255,.8); padding: 1px 2px; border-radius: 2px;
    }

    .houses-row {
      display: flex; gap: 1px; flex-wrap: wrap; justify-content: center;
    }
    .house {
      width: clamp(3px, .5vw, 6px); height: clamp(3px, .5vw, 6px);
      background: #27ae60; border-radius: 1px;
    }
    .hotel {
      font-size: clamp(4px, .7vw, 8px);
      background: #e74c3c; color: #fff;
      padding: 1px 2px; border-radius: 2px; font-weight: bold;
    }

    .tokens-row {
      display: flex; gap: 1px; flex-wrap: wrap; justify-content: center;
    }
    .token {
      width: clamp(8px, 1.2vw, 14px); height: clamp(8px, 1.2vw, 14px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(5px, .8vw, 10px);
      border: 1px solid rgba(0,0,0,.3);
    }

    /* ── Side Panel ────────────────────────────────────────── */
    #side-panel {
      width: 300px; background: var(--surface);
      border-left: 1px solid var(--surface2);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #players-panel {
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      border-bottom: 1px solid var(--surface2);
    }

    .player-card {
      background: var(--surface2); border-radius: var(--radius);
      padding: 10px 12px;
      border: 2px solid transparent;
      transition: border-color .2s;
    }
    .player-card.active { border-color: var(--accent); }
    .player-card.bankrupt { opacity: .45; }

    .player-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    .player-token {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .player-name { font-weight: bold; font-size: .95rem; flex: 1; }
    .badge {
      font-size: .65rem; padding: 2px 6px; border-radius: 20px; font-weight: bold;
    }
    .jail-badge { background: #e74c3c; color: #fff; }
    .bust-badge { background: #555; color: #ccc; }
    .player-money { color: var(--accent); font-size: 1.1rem; font-weight: bold; }
    .player-props { font-size: .8rem; color: var(--text-dim); margin-top: 2px; }

    #controls-panel {
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
      border-bottom: 1px solid var(--surface2);
    }
    .phase-label { font-size: .75rem; color: var(--text-dim); }
    .buy-prompt, .rent-prompt { font-size: .9rem; }
    .card-text {
      font-size: .85rem; line-height: 1.5;
      background: var(--surface2); padding: 10px; border-radius: var(--radius);
      border-left: 3px solid var(--accent);
    }
    .waiting { color: var(--text-dim); font-style: italic; font-size: .85rem; }
    .game-over { font-size: 1.2rem; font-weight: bold; color: var(--accent); text-align: center; }
    .manage-section { display: flex; }

    #game-log {
      flex: 1; overflow-y: auto;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 4px;
      scroll-behavior: smooth;
    }
    .log-entry {
      font-size: .78rem; color: var(--text-dim);
      border-bottom: 1px solid rgba(255,255,255,.04);
      padding-bottom: 3px;
      line-height: 1.4;
    }
    .log-entry:first-child { color: var(--text); }

    /* ── Modal ─────────────────────────────────────────────── */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal.open { display: flex; }
    #modal-box {
      background: var(--surface); border: 1px solid var(--surface2);
      border-radius: var(--radius); padding: 24px;
      max-width: 420px; width: 90%; max-height: 80vh;
      overflow-y: auto; box-shadow: var(--shadow);
      position: relative;
    }
    #modal-box h3 { color: var(--accent); margin-bottom: 12px; font-size: 1.1rem; }
    #modal-box p  { margin-bottom: 8px; font-size: .9rem; }
    #modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--text-dim);
      font-size: 1.4rem; cursor: pointer;
    }
    #modal-close:hover { color: var(--text); }

    .rent-table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-top: 8px; }
    .rent-table th, .rent-table td {
      border: 1px solid var(--surface2); padding: 5px 8px; text-align: left;
    }
    .rent-table th { background: var(--surface2); color: var(--accent); }

    .manage-list { display: flex; flex-direction: column; gap: 8px; }
    .manage-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); padding: 8px 10px; border-radius: var(--radius);
      font-size: .85rem;
    }
    .manage-name { flex: 1; display: flex; align-items: center; gap: 6px; }
    .color-pip { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Host waiting display ───────────────────────────────── */
    #host-waiting { display: none; margin-top: 16px; text-align: center; }
    #host-code-display {
      font-size: 2rem; font-weight: bold; letter-spacing: 6px;
      color: var(--accent); background: var(--surface2);
      padding: 12px 24px; border-radius: var(--radius);
      display: inline-block; margin: 10px 0;
    }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ══ SETUP SCREEN ════════════════════════════════════════ -->
<div id="setup-screen">
  <div class="setup-title">MONOPOLY</div>
  <div class="setup-subtitle">Custom Edition</div>

  <div class="setup-card">
    <div class="setup-tabs">
      <button class="tab-btn active" onclick="switchTab('local')">🏠 Local</button>
      <button class="tab-btn" onclick="switchTab('host')">📡 Host Online</button>
      <button class="tab-btn" onclick="switchTab('join')">🔗 Join Online</button>
    </div>

    <!-- Local -->
    <div id="tab-local" class="tab-panel active">
      <h2>Local Game (same screen)</h2>
      <div class="input-group">
        <input type="text" class="player-name-input" placeholder="Player 1 name" value="Player 1" />
        <input type="text" class="player-name-input" placeholder="Player 2 name" value="Player 2" />
        <input type="text" class="player-name-input" placeholder="Player 3 name (optional)" />
        <input type="text" class="player-name-input" placeholder="Player 4 name (optional)" />
      </div>
      <button class="btn btn-primary btn-full" onclick="UI.startLocalGame()">▶ Start Game</button>
    </div>

    <!-- Host -->
    <div id="tab-host" class="tab-panel">
      <h2>Host an Online Game</h2>
      <div class="input-group">
        <input type="text" id="host-name" placeholder="Your name" />
      </div>
      <button class="btn btn-primary btn-full" onclick="UI.startOnlineHost()">📡 Create Game</button>
      <div id="host-waiting">
        <p style="color:var(--text-dim);font-size:.9rem">Share this code with your partner:</p>
        <div id="host-code-display">------</div>
        <p style="color:var(--text-dim);font-size:.8rem;margin-top:8px">Waiting for them to join...</p>
      </div>
    </div>

    <!-- Join -->
    <div id="tab-join" class="tab-panel">
      <h2>Join an Online Game</h2>
      <div class="input-group">
        <input type="text" id="join-name" placeholder="Your name" />
        <input type="text" id="join-code" placeholder="Game code (e.g. A3BX92)" style="letter-spacing:4px;text-transform:uppercase" />
      </div>
      <button class="btn btn-primary btn-full" onclick="UI.startOnlineJoin()">🔗 Join Game</button>
    </div>
  </div>
</div>

<!-- ══ GAME SCREEN ══════════════════════════════════════════ -->
<div id="game-screen">

  <!-- Board -->
  <div id="board-wrap">
    <div id="board-canvas"></div>
  </div>

  <!-- Side panel -->
  <div id="side-panel">
    <div id="players-panel"></div>
    <div id="controls-panel"></div>
    <div id="game-log"></div>
  </div>

</div>

<!-- ══ MODAL ════════════════════════════════════════════════ -->
<div id="modal" onclick="if(event.target===this)UI.closeModal()">
  <div id="modal-box">
    <button id="modal-close" onclick="UI.closeModal()">×</button>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ══ SCRIPTS ══════════════════════════════════════════════ -->
<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/board.js"></script>
<script src="js/ui.js"></script>
<script src="js/network.js"></script>

<script>
  // Tab switching on setup screen
  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
  }
</script>

</body>
</html>
